# =============================================
# EDUSYS PRO - Coolify Configuration
# =============================================
# 
# Deploy on Coolify with these settings:
# 1. Create new project
# 2. Add resource "Docker Compose"
# 3. Use this configuration
# 4. Set required environment variables
# 5. Deploy
# =============================================

# =============================================
# Environment Variables (REQUIRED)
# =============================================
# Required secrets:
# - SUPABASE_URL: From Supabase Dashboard > Settings > API
# - SUPABASE_ANON_KEY: From Supabase Dashboard > Settings > API  
# - SUPABASE_SERVICE_KEY: From Supabase Dashboard > Settings > API
# - JWT_SECRET: Generate a strong random string (min 32 chars)

# Optional:
# - SERVER_PORT: Default 8080
# - WEB_PORT: Default 3000

version: '3.8'

services:
  api:
    image: ghcr.io/edusyspro/edusys-api:${VERSION:-latest}
    container_name: edusys-api
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: ghcr.io/edusyspro/edusys-web:${VERSION:-latest}
    container_name: edusys-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_API_URL=http://api:${SERVER_PORT:-8080}
    restart: unless-stopped
    depends_on:
      - api

networks:
  default:
    name: coolify